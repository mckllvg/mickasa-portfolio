<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mickasa</title>

  <!-- Fonts and Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="logo1.png" type="image/png">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- Tailwind CSS Framework -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sageBase:   '#F4F8F5', /* Clean mint-white tint background */
            sageMid:    '#E7EFE9', /* Soft complementing contrast mid-tone */
            sageAccent: '#C0D4C0',
            sageBorder: '#B4C4B4',
            tealCta:    '#2E6E50',
            tealDark:   '#1A4A34',
            textDark:   '#1A2E1A',
            textMuted:  '#4A5E4A',
            textHint:   '#6B7A6B',
          },
          fontFamily: {
            sora:  ['Sora', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          }
        },
      },
    }
  </script>
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-sageBase text-textDark font-inter">
  
  <header class="sticky top-0 z-50 w-full px-8 md:px-16 flex justify-between items-center py-4 bg-sageBase/80 backdrop-blur-md border-b border-sageBorder/40">
    <a href="#home">
      <h1 class="text-2xl font-bold text-textDark">mickasa.</h1>
    </a>
    <nav>
      <ul class="flex space-x-7 text-sm font-semibold text-textMuted tracking-wide">
        <li><a href="#home"         class="hover:text-tealCta transition-colors">home</a></li>
        <li><a href="#about"        class="hover:text-tealCta transition-colors">about</a></li>
        <li><a href="#technologies" class="hover:text-tealCta transition-colors">tech</a></li>
        <li><a href="#projects"     class="hover:text-tealCta transition-colors">projects</a></li>
        <li><a href="#contact"      class="hover:text-tealCta transition-colors">contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="home" class="min-h-screen flex flex-col justify-center items-center px-6 text-center">
    <div class="max-w-3xl" data-aos="fade-up">
      <span class="inline-block bg-sageAccent text-tealDark text-xs font-semibold px-4 py-1.5 rounded-full mb-6 tracking-wide">
        data analyst · machine learning · ui/ux design
      </span>

      <h1 class="font-sora text-5xl md:text-6xl font-bold text-textDark leading-tight mb-5">
        welcome to
        <span class="text-tealCta typed-text"></span><span class="cursor"></span>
      </h1>

      <p class="text-textMuted text-base md:text-lg max-w-xl mx-auto mb-8 leading-relaxed">
       I’m <span class="font-semibold text-textDark">Alyanna Mickaela Olviga</span>, a Data Analyst with a focus on machine learning, data analysis, and insight generation.
      </p>

      <div class="flex flex-wrap gap-3 justify-center">
        <a href="Olviga_Resume.pdf"
           class="bg-tealCta text-sageBase px-6 py-2.5 rounded-full text-sm font-semibold hover:bg-tealDark transition-colors">
          Download Resume
        </a>
        <a href="#projects"
           class="bg-transparent text-tealCta border border-tealCta px-6 py-2.5 rounded-full text-sm font-semibold hover:bg-sageAccent transition-colors">
          View My Work
        </a>
      </div>
    </div>
  </main>

  <div data-include="sections/about.html"></div>
  <div data-include="sections/technologies.html"></div>
  <div data-include="sections/projects.html"></div>
  <div data-include="sections/contact.html"></div>

  <!-- Structural Animation Scripts Execution Layer -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="script.js"></script>
</body>
</html>
