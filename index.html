<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>

  <title>mickasa</title>

  <!-- Fonts and Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="pics/me/logo.png" type="image/png">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- Tailwind CSS Framework -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sageBase:   '#F4F8F5', /* Clean mint-white tint background */
            sageMid:    '#E7EFE9', /* Soft complementing contrast mid-tone */
            sageAccent: '#C0D4C0',
            sageBorder: '#B4C4B4',
            tealCta:    '#2E6E50',
            tealDark:   '#1A4A34',
            textDark:   '#1A2E1A',
            textMuted:  '#4A5E4A',
            textHint:   '#6B7A6B',
          },
          fontFamily: {
            sora:  ['Sora', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          }
        },
      },
    }
  </script>
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-sageBase text-textDark font-inter relative overflow-x-hidden">

      <button id="mobile-nav-toggle" type="button" class="md:hidden text-textMuted hover:text-tealCta transition-colors" aria-controls="mobile-nav-menu" aria-expanded="false" aria-label="Open navigation menu">
        <i class="fa-solid fa-bars text-xl"></i>
      </button>
      <nav class="hidden md:block">
        <ul class="flex space-x-7 text-sm font-semibold text-textMuted tracking-wide">
          <li><a href="#home"         class="hover:text-tealCta transition-colors">home</a></li>
          <li><a href="#about"        class="hover:text-tealCta transition-colors">about</a></li>
          <li><a href="#technologies" class="hover:text-tealCta transition-colors">tech</a></li>
          <li><a href="#projects"     class="hover:text-tealCta transition-colors">projects</a></li>
          <li><a href="#contact"      class="hover:text-tealCta transition-colors">contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

    <ul class="flex flex-col gap-2 px-6 py-4 text-sm font-semibold text-textMuted tracking-wide">
      <li><a href="#home"         class="block hover:text-tealCta transition-colors">home</a></li>
      <li><a href="#about"        class="block hover:text-tealCta transition-colors">about</a></li>
      <li><a href="#technologies" class="block hover:text-tealCta transition-colors">tech</a></li>
      <li><a href="#projects"     class="block hover:text-tealCta transition-colors">projects</a></li>
      <li><a href="#contact"      class="block hover:text-tealCta transition-colors">contact</a></li>
    </ul>
  </div>

    <div data-include="sections/home.html"></div>
    <div data-include="sections/about.html"></div>
    <div data-include="sections/technologies.html"></div>
    <div data-include="sections/projects.html"></div>
    <div data-include="sections/contact.html"></div>
  <!-- Structural Animation Scripts Execution Layer -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="script.js"></script>
